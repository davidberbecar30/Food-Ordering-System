services:
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: .
    container_name: user-service
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://user-db:5432/user_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8081
      APP_JWT_SECRET: dev-only-jwt-secret-please-change-me-in-production-32bytes-min
      APP_JWT_EXPIRATION_MS: 86400000
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_EMAIL: admin@foodordering.local
      APP_ADMIN_PASSWORD: admin123
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  user-db-data:
