spring:
  application:
    name: demo

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-this-must-be-a-very-long-secret-key-at-least-32-bytes-long-please}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    email: ${APP_ADMIN_EMAIL:admin@foodordering.local}
    password: ${APP_ADMIN_PASSWORD:admin123}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.foodordering.userservice: INFO
    org.springframework.security: INFO
