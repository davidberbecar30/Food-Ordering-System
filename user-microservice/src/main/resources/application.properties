spring.application.name=user-microservice
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_svc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:user_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:localdevsecrethardcodedforlocal_32chars}