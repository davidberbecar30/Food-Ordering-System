apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: food-ordering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-microservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://order-db:5432/order_db
            - name: SPRING_DATASOURCE_USERNAME
              value: order_svc
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secrets
                  key: order-db-password
            - name: USER_SERVICE_URL
              value: http://user-microservice:8081
            - name: MENU_SERVICE_URL
              value: http://menu-microservice:8082
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-microservice
  namespace: food-ordering
spec:
  selector:
    app: order-service
  ports:
    - port: 8083
      targetPort: 8083
