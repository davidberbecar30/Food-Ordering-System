apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: food-ordering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-microservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: DB_URL
              value: jdbc:postgresql://user-db:5432/user_db
            - name: DB_USERNAME
              value: user_svc
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secrets
                  key: user-db-password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secrets
                  key: jwt-secret
            - name: APP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secrets
                  key: admin-username
            - name: APP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secrets
                  key: admin-email
            - name: APP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secrets
                  key: admin-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-microservice
  namespace: food-ordering
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
