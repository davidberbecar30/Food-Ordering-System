services:

  # Databases

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_svc -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  menu-db:
    image: postgres:16
    environment:
      POSTGRES_DB: menu_db
      POSTGRES_USER: menu_svc
      POSTGRES_PASSWORD: ${MENU_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - menu-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu_svc -d menu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_svc
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_svc -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Services

  user-microservice:
    build: ./user-microservice
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://user-db:5432/user_db
      DB_USERNAME: user_svc
      DB_PASSWORD: ${USER_DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      APP_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@foodordering.local}
      APP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    restart: on-failure
    depends_on:
      user-db:
        condition: service_healthy

  menu-microservice:
    build: ./menu-microservice
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://menu-db:5432/menu_db
      SPRING_DATASOURCE_USERNAME: menu_svc
      SPRING_DATASOURCE_PASSWORD: ${MENU_DB_PASSWORD}
      USER_SERVICE_URL: http://user-microservice:8081
      JWT_SECRET: ${JWT_SECRET}
    restart: on-failure
    depends_on:
      menu-db:
        condition: service_healthy
      user-microservice:
        condition: service_started

  order-microservice:
    build: ./order-microservice
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: order_svc
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      USER_SERVICE_URL: http://user-microservice:8081
      MENU_SERVICE_URL: http://menu-microservice:8082
    restart: on-failure
    depends_on:
      order-db:
        condition: service_healthy
      user-microservice:
        condition: service_started
      menu-microservice:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-microservice:8081
      MENU_SERVICE_URL: http://menu-microservice:8082
      ORDER_SERVICE_URL: http://order-microservice:8083
    restart: on-failure
    depends_on:
      - user-microservice
      - menu-microservice
      - order-microservice

volumes:
  user-db-data:
  menu-db-data:
  order-db-data:
