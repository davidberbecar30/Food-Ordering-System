services:

  #Databases,

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  menu-db:
    image: postgres:16
    environment:
      POSTGRES_DB: menu_db
      POSTGRES_USER: menu_svc
      POSTGRES_PASSWORD: ${MENU_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - menu-db-data:/var/lib/postgresql/data

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_svc
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data

  #Services

  user-microservice:
    build: ./user-microservice
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_svc
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    restart: on-failure
    depends_on:
      - user-db

  menu-microservice:
    build: ./menu-microservice
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://menu-db:5432/menu_db
      SPRING_DATASOURCE_USERNAME: menu_svc
      SPRING_DATASOURCE_PASSWORD: ${MENU_DB_PASSWORD}
      USER_SERVICE_URL: http://user-microservice:8081
    restart: on-failure
    depends_on:
      - menu-db
      - user-microservice

  order-microservice:
    build: ./order-microservice
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: order_svc
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      USER_SERVICE_URL: http://user-microservice:8081
      MENU_SERVICE_URL: http://menu-microservice:8082
    restart: on-failure
    depends_on:
      - order-db
      - user-microservice
      - menu-microservice

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-microservice:8081
      MENU_SERVICE_URL: http://menu-microservice:8082
      ORDER_SERVICE_URL: http://order-microservice:8083
    restart: on-failure
    depends_on:
      - user-microservice
      - menu-microservice
      - order-microservice

volumes:
  user-db-data:
  menu-db-data:
  order-db-data: