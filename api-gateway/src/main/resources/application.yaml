spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: ${USER_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/users/**
            filters:
              - RewritePath=/users/(?<segment>.*),/api/users/$\{segment}

          - id: menu-service
            uri: ${MENU_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/menu/**
            filters:
              - RewritePath=/menu/(?<segment>.*),/api/menu/$\{segment}

          - id: order-service
            uri: ${ORDER_SERVICE_URL:http://localhost:8083}
            predicates:
              - Path=/orders/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
